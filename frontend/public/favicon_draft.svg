<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Orange rounded square background -->
  <rect width="100" height="100" rx="22" ry="22" fill="#E8601C"/>

  <!-- White bold "b" letterform -->
  <!-- Vertical stem -->
  <rect x="22" y="16" width="14" height="68" rx="7" fill="white"/>
  <!-- Bowl of the b (right side bump) -->
  <ellipse cx="52" cy="65" rx="19" ry="19" fill="#E8601C"/>
  <ellipse cx="52" cy="65" rx="13" ry="13" fill="white"/>
  <!-- Fill the gap between stem and bowl -->
  <rect x="22" y="46" width="30" height="38" rx="0" fill="white"/>
  <!-- Mask out inside of bowl -->
  <ellipse cx="52" cy="65" rx="13" ry="13" fill="#E8601C"/>
  <!-- Re-draw left part of bowl attached to stem -->
  <rect x="29" y="46" width="23" height="38" fill="white"/>
  <ellipse cx="52" cy="65" rx="13" ry="13" fill="#E8601C"/>

  <!-- Play arrow / triangle (small, in upper-right of the b) -->
  <polygon points="58,22 70,30 58,38" fill="white"/>
</svg>
